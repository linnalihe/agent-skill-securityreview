name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      - name: Run tests before releasing
        run: |
          bash tests/test_scan_patterns.sh
          bash tests/test_frontmatter.sh

      - name: Build .skill bundle
        run: bash skills/security-review/scripts/build-skill.sh

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog entry for this version
        id: changelog
        run: |
          # Pull the section for this version out of CHANGELOG.md.
          # Section format: "## v<version> — <date>"
          VERSION="${{ steps.version.outputs.version }}"
          awk "/^## v${VERSION}[[:space:]]/{found=1; next} found && /^## v/{exit} found{print}" CHANGELOG.md > release_notes.txt
          echo "Release notes:"
          cat release_notes.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "security-review v${{ steps.version.outputs.version }}"
          body_path: release_notes.txt
          files: |
            dist/security-review-${{ steps.version.outputs.version }}.skill
            dist/security-review.skill
          fail_on_unmatched_files: true

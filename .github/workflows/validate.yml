name: Validate

on: [push, pull_request]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      - name: Run scanner regression tests
        run: bash tests/test_scan_patterns.sh

      - name: Run frontmatter validation
        run: bash tests/test_frontmatter.sh

      - name: Check scripts are executable
        run: |
          for f in skills/security-review/scripts/*.sh hooks/scripts/*.sh; do
            test -x "$f" || { echo "FAIL: $f is not executable"; exit 1; }
          done
          echo "PASS: all scripts are executable"

      - name: Verify build-skill.sh runs cleanly
        run: bash skills/security-review/scripts/build-skill.sh
